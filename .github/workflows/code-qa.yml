name: code-qa

# Uses pull_request_target so the workflow YAML and scripts/ are always
# taken from main, not the PR branch. This prevents a PR from modifying
# its own reviewer. Safe here because code-qa only inspects diff text;
# it never executes PR code. Do NOT add steps that run PR-provided code
# (npm install, build, test) under this trigger — that would be a
# privilege-escalation hole, since pull_request_target runs with full
# repo permissions and access to secrets. Build runs on `pull_request`.
on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  code-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      verdict: ${{ steps.codeqa.outputs.verdict }}
    steps:
      # Checks out main (the base ref) — gives us scripts/ and CLAUDE.md
      # from main, not from the PR branch.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fetch the PR's commits so `git diff $BASE..$HEAD` works.
      # We do NOT check them out — they are read as text via git diff only.
      - name: Fetch PR head
        run: git fetch origin "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/pull/${{ github.event.pull_request.number }}/head"

      - name: Run code-qa review
        id: codeqa
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY:    ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA:       ${{ github.event.pull_request.base.sha }}
          REPO:              ${{ github.repository }}
        run: bash scripts/code-qa.sh

      - name: Guard — post failure if code-qa did not complete
        if: always() && steps.codeqa.outcome != 'success'
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY:    ${{ secrets.LINEAR_API_KEY }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
          REPO:              ${{ github.repository }}
        run: bash scripts/code-qa-guard.sh "in-job-finalizer"

  # Catastrophic-failure finalizer: runs even if the main job is cancelled,
  # OOM-killed, or the runner drops before the in-job guard can fire.
  code-qa-guard:
    needs: [code-qa]
    if: always() && (needs.code-qa.result == 'cancelled' || needs.code-qa.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Post failure status (catastrophic guard)
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY:    ${{ secrets.LINEAR_API_KEY }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
          REPO:              ${{ github.repository }}
        run: bash scripts/code-qa-guard.sh "catastrophic-finalizer"
